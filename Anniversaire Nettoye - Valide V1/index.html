<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Beboo 💕</title>

  <style>
    :root{
      --beige: #efe7d2;
      --red: #b11212;
      --text-red: #7c1515;
      --shadow: 0 18px 40px rgba(0, 0, 0, .22);
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body{
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: #2a1c1c;
      background: var(--beige);
    }

    @font-face{
      font-family: "DancingScript";
      src: url("./assets/fonts/DancingScript-Regular.ttf") format("truetype");
      font-weight: 400;
    }

    @font-face{
      font-family: "DancingScript";
      src: url("./assets/fonts/DancingScript-Bold.ttf") format("truetype");
      font-weight: 700;
    }

    .screen{
      position: absolute;
      inset: 0;
      display: none;
      padding: 44px 18px;
    }

    .screen.is-active{
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap{
      width: min(1100px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .btn,
    .resetBtn,
    .monthBtn{
      border: none;
      cursor: pointer;
    }

    .btn:hover,
    .resetBtn:hover{
      filter: brightness(1.05);
    }

    .btn:active{
      transform: translateY(1px);
    }

    .btn{
      padding: 14px 22px;
      background: var(--text-red);
      color: #fff;
      font-weight: 900;
      letter-spacing: .4px;
    }

    .resetBtn{
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 999;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: var(--red);
      box-shadow: 0 8px 18px rgba(0, 0, 0, .2);
    }

    /* =========================
       Écrans
       ========================= */
    #p0{
      padding: 0;
      background: var(--beige);
    }

    .loadingWrap,
    .loadingContent{
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loadingWrap{
      position: relative;
      width: 100%;
      height: 100%;
    }

    .loadingContent{
      flex-direction: column;
      gap: 28px;
    }

    .loadingLottie{
      width: min(280px, 55vw);
      aspect-ratio: 1 / 1;
      transform: scale(.72);
      will-change: transform, opacity;
    }

    .loadingOut{
      animation: loadingOut .42s ease forwards;
    }

    .loadingText{
      font-family: "DancingScript", cursive;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-red);
      animation: heartbeatText 3.5s ease-in-out infinite;
    }

    @keyframes loadingOut{
      to{
        opacity: 0;
        transform: scale(.92);
      }
    }

    @keyframes heartbeatText{
      0%{
        opacity: .7;
        transform: translateY(0) scale(1);
      }
      40%{
        opacity: 1;
        transform: translateY(-3px) scale(1.06);
      }
      60%{
        opacity: .85;
        transform: translateY(0) scale(1);
      }
      100%{
        opacity: .7;
        transform: translateY(0) scale(1);
      }
    }

    /* =========================
       Intro
       ========================= */
    .heroBox{
      position: relative;
      z-index: 1;
      width: min(860px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 34px 26px;
    }

    .typewrap{
      position: relative;
      display: inline-block;
    }

    .typeTitle,
    h2{
      margin: 0;
      color: var(--text-red);
      font-family: "DancingScript", cursive;
      font-weight: 700;
    }

    .typeTitle{
      font-size: 64px;
      line-height: 1.05;
      letter-spacing: -1px;
      white-space: nowrap;
    }

    .sub{
      margin: 0;
      font-size: 22px;
      text-align: center;
      opacity: .85;
    }

    .caret{
      position: absolute;
      right: 0;
      bottom: -8px;
      width: 24px;
      height: 3px;
      border-radius: 2px;
      background: var(--text-red);
      animation: blink .8s infinite;
    }

    @keyframes blink{
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .heartsLayer{
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .heart{
      position: absolute;
      left: var(--x, 50%);
      bottom: -40px;
      font-size: var(--s, 18px);
      opacity: 0;
      transform: translateX(-50%) scale(1);
      filter: drop-shadow(0 8px 10px rgba(0, 0, 0, .12));
      animation: floatUp var(--d, 6s) linear forwards;
    }

    @keyframes floatUp{
      0%{
        opacity: 0;
        transform: translateX(-50%) translateY(0) scale(.9);
      }
      10%{
        opacity: .75;
      }
      100%{
        opacity: 0;
        transform: translateX(calc(-50% + var(--drift, 0px))) translateY(-110vh) scale(1.15);
      }
    }

    /* =========================
       Page 2
       ========================= */
    .page2Box{
      width: min(1100px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 22px;
    }

    h2{
      font-size: 58px;
      letter-spacing: .5px;
      text-align: center;
    }

    .monthsGrid{
      width: 100%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 40px;
      margin: 40px auto 0;
      justify-content: center;
    }

    @media (max-width: 980px){
      .monthsGrid{ grid-template-columns: repeat(3, 1fr); }
      .typeTitle{ font-size: 44px; }
      h2{ font-size: 44px; }
    }

    @media (max-width: 520px){
      .monthsGrid{ grid-template-columns: repeat(2, 1fr); }
    }

    /* =========================
       Mini enveloppes
       ========================= */
    .monthBtn{
      padding: 0;
      background: transparent;
    }

    .miniWrap{
      width: 100%;
      max-width: 220px;
      aspect-ratio: 16 / 10;
      margin: 0 auto;
      perspective: 900px;
    }

    .mini3d{
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform .55s cubic-bezier(.2, .9, .2, 1);
    }

    #monthsGrid .mini3d{
      transition-duration: 2.5s;
    }

    .monthBtn:hover .mini3d{
      transform: rotateY(180deg);
    }

    .miniFace{
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: rgba(255, 255, 255, .95);
      font-size: 32px;
      font-family: "DancingScript", cursive;
      font-weight: 700;
      background: var(--red);
      box-shadow: 0 12px 26px rgba(0, 0, 0, .12);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .miniFace::before,
    .closedBack::before,
    .miniSeen .seenEnv::before{
      content: "";
      position: absolute;
      inset: -40px;
      background-image:
        radial-gradient(circle at 18% 28%, rgba(255,255,255,.12), transparent 35%),
        radial-gradient(circle at 78% 62%, rgba(0,0,0,.12), transparent 40%),
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,.05),
          rgba(255,255,255,.05) 1px,
          transparent 1px,
          transparent 3px
        );
      opacity: .22;
      filter: contrast(112%) brightness(106%);
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    .miniFront span{
      position: relative;
      z-index: 2;
    }

    .miniBack{
      font-size: 0;
      transform: rotateY(180deg);
    }

    .miniBack .flap{
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 2;
      height: 62%;
      opacity: .58;
      background: rgba(0,0,0,.18);
      clip-path: polygon(0 0, 100% 0, 50% 75%);
      transform-origin: 50% 0%;
      transform: rotateX(0deg);
      transition: transform .25s ease;
    }

    .monthBtn:hover .miniBack .flap{
      transform: rotateX(-18deg);
    }

    .monthBtn.is-seen .mini3d{
      transform: none !important;
    }

    .monthBtn.is-seen .miniFront,
    .monthBtn.is-seen .miniBack{
      opacity: 0;
    }

    .miniSeen{
      position: absolute;
      inset: 0;
      display: none;
      pointer-events: none;
    }

    .monthBtn.is-seen .miniSeen{
      display: block;
    }

    .miniSeen .seenEnv{
      position: absolute;
      top: 10%;
      left: 8%;
      width: 78%;
      height: 78%;
      overflow: visible;
      background: var(--red);
      box-shadow: 0 12px 26px rgba(0, 0, 0, .16);
      transform: rotate(-10deg);
    }

    .miniSeen .seenFlap{
      position: absolute;
      top: -58%;
      left: 0;
      right: 0;
      z-index: 1;
      height: 58%;
      background: var(--red);
      clip-path: polygon(0 100%, 50% 0, 100% 100%);
    }

    .miniSeen .seenEnv::after{
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 2;
      height: 4px;
      background: var(--red);
    }

    .miniSeen .seenPolaroid{
      position: absolute;
      top: 30%;
      left: 45%;
      z-index: 4;
      width: 53%;
      height: 100%;
      background: #f6f3ee;
      border: 10px solid #f6f3ee;
      box-shadow: 0 15px 30px rgba(0, 0, 0, .22);
      transform: translate(-50%, -50%) rotate(8deg);
    }

    .miniSeen .seenPhoto{
      position: absolute;
      top: 0;
      right: 0;
      bottom: 13px;
      left: 0;
      border: 1px solid rgba(0,0,0,.12);
      background: var(--thumb, none);
      background-position: center;
      background-size: cover;
    }

    /* =========================
       Overlay
       ========================= */
    .overlay{
      position: fixed;
      inset: 0;
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .overlay.is-open{
      display: flex;
    }

    .backdrop{
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.20);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .overlayContent{
      position: relative;
      width: min(980px, 92vw);
      height: min(720px, 82vh);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
    }

    .overlayHint{
      position: absolute;
      bottom: 18px;
      left: 50%;
      display: block;
      padding: 14px 18px;
      color: rgba(255,255,255,.95);
      font-weight: 900;
      border-radius: 999px;
      background: rgba(255,255,255,.18);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transform: translateX(-50%);
      user-select: none;
      pointer-events: none;
    }

    /* =========================
       Grande enveloppe
       ========================= */
    .envStage{
      position: relative;
      width: 360px;
      height: 260px;
      user-select: none;
      touch-action: none;
      perspective: 1200px;
      transform-style: preserve-3d;
      transition: transform .35s ease;
    }

    .envStage.is-opened{
      transform: rotate(-9deg);
      transform-origin: 50% 55%;
    }

    .closedBack{
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--red);
      box-shadow: var(--shadow);
    }

    .innerLining{
      position: absolute;
      top: 22px;
      left: 18px;
      right: 18px;
      z-index: 1;
      height: 150px;
      opacity: 0;
      overflow: hidden;
      background: #efe9dc;
      clip-path: polygon(0 0, 100% 0, 50% 70%);
      transition: opacity .25s ease;
    }

    .innerLining::before{
      content: "";
      position: absolute;
      inset: -40px;
      opacity: .22;
      filter: contrast(110%) brightness(104%);
      mix-blend-mode: multiply;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 25% 35%, rgba(0,0,0,.08), transparent 42%),
        repeating-linear-gradient(
          0deg,
          rgba(0,0,0,.03),
          rgba(0,0,0,.03) 1px,
          transparent 1px,
          transparent 4px
        );
    }

    .closedFlap{
      --flap-angle: 0deg;
      --flap-tilt: 0deg;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 30;
      height: 66%;
      margin-top: -2px;
      pointer-events: auto;
      transform-origin: 50% 0%;
      transform-style: preserve-3d;
      transform: rotateZ(var(--flap-tilt)) rotateX(var(--flap-angle));
      transition: transform .55s cubic-bezier(.2,.9,.2,1);
    }

    .closedFlap::before,
    .closedFlap::after{
      content: "";
      position: absolute;
      top: -2px;
      right: -2px;
      bottom: -8px;
      left: -2px;
      clip-path: polygon(0 0, 100% 0, 50% 78%);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform-origin: 50% 0%;
      transition: transform .55s cubic-bezier(.2,.9,.2,1);
      background: var(--red);
      opacity: 1;
    }

    .closedFlap::after{
      transform: translateZ(1px);
    }

    .closedFlap::before{
      transform: rotateX(180deg);
    }

    .envStage:not(.is-opened) .closedBack:hover .closedFlap{
      --flap-angle: -18deg;
    }

    .envStage:not(.is-opened) .closedFlap::after{
      filter: brightness(.82);
    }

    .envStage.is-opened .closedBack{
      overflow: visible;
    }

    .envStage.is-opened .innerLining{
      opacity: 1;
    }

    .envStage.is-opened .closedFlap{
      top: -57%;
      z-index: 20;
      height: 58%;
      pointer-events: none;
      --flap-angle: 0deg;
    }

    .envStage.is-opened .closedFlap::before,
    .envStage.is-opened .closedFlap::after{
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      clip-path: polygon(0 100%, 50% 0, 100% 100%);
    }

    /* =========================
       Polaroid
       ========================= */
    .photo{
      position: absolute;
      top: 42%;
      left: 50%;
      z-index: 50;
      width: 260px;
      height: 320px;
      opacity: 0;
      pointer-events: none;
      perspective: 1000px;
      transform: translate(-50%, -50%) rotate(0deg) !important;
      transition: opacity .3s ease, transform .3s ease;
    }

    .envStage.is-opened .photo{
      opacity: 1;
      cursor: pointer;
      pointer-events: auto;
      transform: translate(-50%, -50%) translateY(-10px) rotate(9deg) !important;
      transition:
        opacity .3s ease,
        transform .45s cubic-bezier(.2,.9,.2,1),
        filter .45s ease;
    }

    .envStage.is-opened .photo:hover{
      filter: drop-shadow(0 28px 45px rgba(0,0,0,.28));
      transform: translate(-50%, -50%) translateY(-18px) rotate(6deg) scale(1.04) !important;
    }

    .photoInner{
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 1.6s cubic-bezier(.2,.9,.2,1);
    }

    .photo.is-flipped .photoInner{
      transform: rotateY(180deg);
    }

    .photoInner,
    .photoFace,
    .photoFrame,
    .photoImg,
    .monthNote{
      pointer-events: none;
    }

    .photoFace{
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .photoFront{
      background: #f6f3ee;
    }

    .photoBack{
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #fff;
      transform: rotateY(180deg);
    }

    .photoFrame{
      position: absolute;
      top: 12px;
      right: 12px;
      bottom: 54px;
      left: 12px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,.12);
      background: #fff;
    }

    .photoImg{
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .monthNote{
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      color: var(--text-red);
      font-family: "DancingScript", cursive;
      font-size: 28px;
      line-height: 1.2;
      text-align: center;
    }
  </style>
</head>

<body>
  <main class="app">

    <section class="screen is-active" id="p0" aria-label="Loading">
      <div class="loadingWrap">
        <div class="loadingContent">
          <div id="loadingLottie" class="loadingLottie" aria-hidden="true"></div>
          <p class="loadingText">Chargement des battements…</p>
        </div>
      </div>
    </section>

    <section class="screen" id="p1">
      <div class="heartsLayer" id="heartsLayer"></div>

      <div class="wrap">
        <div class="heroBox">
          <div class="typewrap">
            <h1 class="typeTitle" id="typeTitle"></h1>
            <span class="caret" aria-hidden="true"></span>
          </div>

          <p class="sub">Pépette et moi te souhaitons le meilleur des anniversaires</p>
          <button class="btn" id="startBtn">Célébrons le</button>
        </div>
      </div>
    </section>

    <section class="screen" id="p2">
      <div class="wrap">
        <div class="page2Box">
          <h2>Pour fêter ça, revoyons notre année 2025</h2>
          <div class="monthsGrid" id="monthsGrid"></div>
          <button id="resetBtn" class="resetBtn">Reset</button>
        </div>
      </div>
    </section>

    <div class="overlay" id="overlay" aria-hidden="true">
      <div class="backdrop" id="backdrop"></div>

      <div class="overlayContent" role="dialog" aria-modal="true">
        <div class="envStage" id="envStage">
          <div class="closedBack">
            <div class="innerLining"></div>
            <div class="closedFlap" id="closedFlap" title="Glisse vers le haut pour ouvrir"></div>
          </div>

          <div class="photo" id="photo" aria-label="Polaroid">
            <div class="photoInner" id="photoInner">
              <div class="photoFace photoFront">
                <div class="photoFrame">
                  <img id="photoImg" class="photoImg" src="" alt="" />
                </div>
              </div>

              <div class="photoFace photoBack">
                <div id="monthNote" class="monthNote"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="overlayHint" id="overlayHint">Maintiens + glisse vers le haut pour ouvrir</div>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js" defer></script>

  <script>
    const MONTHS = [
      "Janvier", "Février", "Mars", "Avril", "Mai", "Juin",
      "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"
    ];

    const MONTH_NOTES = {
      Janvier: "Un début d'année sous drogue",
      Février: "Ma première bague (et pas la dernière)",
      Mars: "Notre premier diplôme",
      Avril: "La meilleure des vues",
      Mai: "L'un des meilleurs parc",
      Juin: "Un peu de nous",
      Juillet: "Matte moi ce beau gosse",
      Août: "Premier repas chez nous",
      Septembre: "Notre seul et unique Pitaya de Cholet",
      Octobre: "Notre 1er Halloween",
      Novembre: "Le meilleur des tontons",
      Décembre: "Notre nouvel an entouré de vieux"
    };

    const MONTH_PHOTOS = {
      Janvier: "./img/janvier.jpg",
      Février: "./img/fevrier.jpg",
      Mars: "./img/mars.jpg",
      Avril: "./img/avril.jpg",
      Mai: "./img/mai.jpg",
      Juin: "./img/juin.jpg",
      Juillet: "./img/juillet.jpg",
      Août: "./img/aout.jpg",
      Septembre: "./img/septembre.jpg",
      Octobre: "./img/octobre.jpg",
      Novembre: "./img/novembre.jpg",
      Décembre: "./img/decembre.jpg"
    };

    const STORAGE_PREFIX = "month-seen-";
    const TYPEWRITER_TEXT = "Joyeux anniversaire, Beboo 💕";
    const LOADING_PATH = "./assets/loading-heart.json";

    const screens = {
      loading: document.getElementById("p0"),
      intro: document.getElementById("p1"),
      months: document.getElementById("p2")
    };

    const elements = {
      title: document.getElementById("typeTitle"),
      heartsLayer: document.getElementById("heartsLayer"),
      startBtn: document.getElementById("startBtn"),
      resetBtn: document.getElementById("resetBtn"),
      monthsGrid: document.getElementById("monthsGrid"),
      overlay: document.getElementById("overlay"),
      backdrop: document.getElementById("backdrop"),
      envStage: document.getElementById("envStage"),
      closedFlap: document.getElementById("closedFlap"),
      overlayHint: document.getElementById("overlayHint"),
      photo: document.getElementById("photo"),
      photoImg: document.getElementById("photoImg"),
      monthNote: document.getElementById("monthNote"),
      loadingLottie: document.getElementById("loadingLottie")
    };

    const state = {
      heartsTimer: null,
      opened: false,
      startY: null,
      activeMonth: null,
      openDirectly: false,
      photoFlipBound: false
    };

    function showScreen(screenToShow){
      Object.values(screens).forEach(screen => screen.classList.remove("is-active"));
      screenToShow.classList.add("is-active");
    }

    function getSeenKey(month){
      return `${STORAGE_PREFIX}${month}`;
    }

    function isMonthSeen(month){
      return localStorage.getItem(getSeenKey(month)) === "1";
    }

    function markMonthSeen(month){
      localStorage.setItem(getSeenKey(month), "1");
    }

    function clearSeenMonths(){
      MONTHS.forEach(month => localStorage.removeItem(getSeenKey(month)));
    }

    function startTypewriter(){
      let index = 0;
      elements.title.textContent = "";

      function typeNext(){
        elements.title.textContent = TYPEWRITER_TEXT.slice(0, index);
        index += 1;

        if (index <= TYPEWRITER_TEXT.length){
          setTimeout(typeNext, 120);
        }
      }

      typeNext();
    }

    function createHeart(){
      const heart = document.createElement("div");
      const size = 14 + Math.random() * 26;
      const duration = 4.8 + Math.random() * 3.8;
      const drift = (Math.random() * 160) - 80;
      const x = Math.random() * 100;

      heart.className = "heart";
      heart.textContent = "❤️";
      heart.style.setProperty("--x", `${x}%`);
      heart.style.setProperty("--s", `${size}px`);
      heart.style.setProperty("--d", `${duration}s`);
      heart.style.setProperty("--drift", `${drift}px`);

      elements.heartsLayer.appendChild(heart);
      setTimeout(() => heart.remove(), duration * 1000);
    }

    function startHearts(){
      if (state.heartsTimer) return;
      state.heartsTimer = setInterval(createHeart, 260);
    }

    function stopHearts(){
      if (!state.heartsTimer) return;
      clearInterval(state.heartsTimer);
      state.heartsTimer = null;
    }

    function resetOverlayState(){
      state.opened = false;
      state.startY = null;
      state.openDirectly = false;

      elements.envStage.classList.remove("is-opened");
      elements.closedFlap.style.removeProperty("--flap-angle");
      elements.overlayHint.textContent = "Maintiens + glisse vers le haut pour ouvrir";
      elements.overlayHint.style.display = "block";
      elements.photo.classList.remove("is-flipped");
    }

    function closeOverlay(){
      elements.overlay.classList.remove("is-open");
      elements.overlay.setAttribute("aria-hidden", "true");
      resetOverlayState();
      state.activeMonth = null;
    }

    function setOverlayContent(month){
      elements.photoImg.src = MONTH_PHOTOS[month] || "";
      elements.photoImg.alt = `Photo ${month}`;
      elements.monthNote.textContent = MONTH_NOTES[month] || "";
    }

    function openOverlay(month){
      state.activeMonth = month;
      setOverlayContent(month);
      resetOverlayState();

      state.openDirectly = isMonthSeen(month);

      elements.overlay.classList.add("is-open");
      elements.overlay.setAttribute("aria-hidden", "false");

      if (state.openDirectly){
        state.opened = true;
        elements.envStage.classList.add("is-opened");
        elements.overlayHint.style.display = "none";
      }
    }

    function updateMonthButtonSeenState(month){
      const buttons = elements.monthsGrid.querySelectorAll(".monthBtn");

      buttons.forEach(button => {
        const label = button.getAttribute("aria-label") || "";
        if (label.includes(month)){
          button.classList.add("is-seen");
        }
      });
    }

    function commitOpen(){
      if (state.opened) return;

      state.opened = true;
      elements.closedFlap.style.removeProperty("--flap-angle");
      elements.envStage.classList.add("is-opened");
      elements.overlayHint.style.display = "none";

      if (state.activeMonth){
        markMonthSeen(state.activeMonth);
        updateMonthButtonSeenState(state.activeMonth);
      }
    }

    function resetFlapIfNeeded(){
      if (!state.opened && !state.openDirectly){
        elements.closedFlap.style.setProperty("--flap-angle", "0deg");
      }

      state.startY = null;
    }

    function createMiniEnvelope(month){
      const button = document.createElement("button");
      button.type = "button";
      button.className = "monthBtn";
      button.setAttribute("aria-label", `Ouvrir l'enveloppe ${month}`);

      const thumb = MONTH_PHOTOS[month] || "";
      button.style.setProperty("--thumb", thumb ? `url("${thumb}")` : "none");

      if (isMonthSeen(month)){
        button.classList.add("is-seen");
      }

      button.innerHTML = `
        <div class="miniWrap">
          <div class="mini3d">
            <div class="miniFace miniFront">
              <span>${month}</span>
            </div>

            <div class="miniFace miniBack">
              <div class="flap" title="Survole le rabat"></div>
            </div>

            <div class="miniSeen">
              <div class="seenEnv">
                <div class="seenFlap"></div>
              </div>

              <div class="seenPolaroid">
                <div class="seenPhoto"></div>
              </div>
            </div>
          </div>
        </div>
      `;

      button.addEventListener("click", () => openOverlay(month));

      return button;
    }

    function renderMonths(){
      elements.monthsGrid.innerHTML = "";
      MONTHS.forEach(month => elements.monthsGrid.appendChild(createMiniEnvelope(month)));
    }

    function bindPhotoFlip(){
      if (state.photoFlipBound) return;

      state.photoFlipBound = true;

      elements.photo.addEventListener("click", event => {
        event.stopPropagation();

        if (!state.opened && !state.openDirectly) return;
        elements.photo.classList.toggle("is-flipped");
      });
    }

    function bindEnvelopeDrag(){
      elements.envStage.addEventListener("pointerdown", event => {
        if (state.opened || state.openDirectly) return;
        state.startY = event.clientY;
        elements.closedFlap.style.setProperty("--flap-angle", "0deg");
      });

      elements.envStage.addEventListener("pointermove", event => {
        if (state.opened || state.openDirectly || state.startY === null) return;

        const dy = state.startY - event.clientY;
        const progress = Math.max(0, Math.min(1, dy / 95));
        const angle = -progress * 120;

        elements.closedFlap.style.setProperty("--flap-angle", `${angle}deg`);

        if (dy > 70){
          commitOpen();
          state.startY = null;
        }
      });

      elements.envStage.addEventListener("pointerup", resetFlapIfNeeded);
      elements.envStage.addEventListener("pointercancel", resetFlapIfNeeded);
    }

    function bindEvents(){
      elements.startBtn.addEventListener("click", () => {
        stopHearts();
        showScreen(screens.months);
      });

      elements.resetBtn.addEventListener("click", () => {
        clearSeenMonths();
        renderMonths();
      });

      elements.backdrop.addEventListener("click", closeOverlay);

      window.addEventListener("keydown", event => {
        if (event.key === "Escape" && elements.overlay.classList.contains("is-open")){
          closeOverlay();
        }
      });

      bindPhotoFlip();
      bindEnvelopeDrag();
    }

    function runLoadingThenIntro(){
      function boot(){
        if (!window.lottie || !elements.loadingLottie){
          requestAnimationFrame(boot);
          return;
        }

        const animation = lottie.loadAnimation({
          container: elements.loadingLottie,
          renderer: "svg",
          loop: false,
          autoplay: true,
          path: LOADING_PATH
        });

        animation.addEventListener("enterFrame", () => {
          const total = animation.totalFrames || 1;
          const current = animation.currentFrame || 0;
          const t = Math.max(0, Math.min(1, current / total));
          const eased = t * (2 - t);
          const scale = 0.72 + eased * (1.5 - 0.72);

          elements.loadingLottie.style.transform = `scale(${scale.toFixed(4)})`;
        });

        animation.addEventListener("complete", () => {
          elements.loadingLottie.classList.add("loadingOut");

          setTimeout(() => {
            showScreen(screens.intro);
            startTypewriter();
            startHearts();
          }, 420);
        });
      }

      boot();
    }

    function init(){
      renderMonths();
      bindEvents();
      runLoadingThenIntro();
    }

    init();
  </script>
</body>
</html>
